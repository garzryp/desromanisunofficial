<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Romanis Unofficial</title>
    <style>
        :root {
            --bg: #0a0b10; --side: #11141d; --card: #161a23; --text: #d1d5db;
            --accent: #3b82f6; --border: #2d333d; --err: #f87171; --ok: #34d399;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
        body.custom-bg::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 0; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; z-index: 10; align-items: center; }
        .sidebar h1 { color: var(--accent); font-size: 1.1rem; margin-bottom: 20px; text-align: center; }
        .sidebar h2 { font-size: 0.7rem; color: #6b7280; width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; text-align: center; margin-top: 15px; }
        .nav-btn { background: #1c1f26; border: 1px solid var(--border); color: var(--text); text-align: center; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; width: 95%; transition: 0.2s; }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Main Area */
        .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; z-index: 1; }
        .container { background: var(--card); padding: 2rem; border-radius: 15px; width: 100%; max-width: 800px; text-align: center; border: 1px solid var(--border); display: none; }
        .container.active { display: block; }

        /* Vocab Elements */
        #v-meta { font-size: 0.65rem; color: #000; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
        #v-latin { font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 15px; }
        #vocab-input { width: 60%; padding: 10px; font-size: 1.1rem; border-radius: 6px; border: 2px solid var(--border); background: #000; color: #fff; text-align: center; outline: none; }
        .v-stat { color: #6b7280; font-size: 0.8rem; margin-top: 5px; font-weight: bold; }
        .timer-bar { width: 60%; height: 6px; background: #2d333d; border-radius: 10px; margin: 15px auto 0 auto; overflow: hidden; display: none; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        /* Grammar Tables */
        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; font-size: 0.85rem; }
        th { background: #111827; color: var(--accent); }
        .grammar-input { width: 90%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; text-align: center; outline: none; }
        .correct { color: var(--ok) !important; border-bottom-color: var(--ok) !important; }
        .incorrect { color: var(--err) !important; border-bottom-color: var(--err) !important; }
        .ans-hint { font-size: 0.7rem; color: var(--err); display: block; }

        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 10px 5px; }
        .slot-btn { padding: 6px 10px; border: 1px solid var(--border); background: #161b22; color: white; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .slot-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 onclick="goHome()" style="cursor:pointer">🏛️ DE ROMANIS UNOFFICIAL</h1>
    
    <h2>Vocab</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 4px;">
        <button class="nav-btn" onclick="startVocab([1])">CH 1</button><button class="nav-btn" onclick="startVocab([2])">CH 2</button>
        <button class="nav-btn" onclick="startVocab([3])">CH 3</button><button class="nav-btn" onclick="startVocab([4])">CH 4</button>
        <button class="nav-btn" onclick="startVocab([5])">CH 5</button><button class="nav-btn" onclick="startVocab([6])">CH 6</button>
        <button class="nav-btn" onclick="startVocab([7])">CH 7</button><button class="nav-btn" onclick="startVocab([8])">CH 8</button>
    </div>
    <button class="nav-btn" onclick="startVocab([1,2,3,4])" style="margin-top:5px;">CH 1-4</button>
    <button class="nav-btn" onclick="startVocab([5,6,7,8])">CH 5-8</button>
    <button class="nav-btn" onclick="startVocab([1,2,3,4,5,6,7,8])">ALL CHAPTERS</button>

    <h2>Grammar</h2>
    <button class="nav-btn" onclick="loadGrammar('hic')">Hic / Ille (M/F Nom+Acc)</button>
    <button class="nav-btn" onclick="loadGrammar('is')">Is / Ea (Acc+)</button>
    <button class="nav-btn" onclick="loadGrammar('qui')">Qui / Quae (Nom+Acc)</button>
    <button class="nav-btn" onclick="loadGrammar('eo')">Verb: Eo (Full)</button>
    <button class="nav-btn" onclick="loadGrammar('sum')">Verb: Sum (No Impf)</button>
</div>

<div class="main">
    <div id="home-view" class="container active">
        <h1>Home</h1>
        <div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px;">
            <label style="cursor:pointer; font-weight:bold;">
                <input type="checkbox" id="timer-toggle" onchange="toggleTimerPref()"> Enable Sudden Death (5s)
            </label>
        </div>
        <div>
            <h3>Background Slots</h3>
            <div style="display:flex; gap:8px; justify-content:center; margin-bottom:10px;">
                <button class="slot-btn" id="s1" onclick="useSlot(1)">S1</button>
                <button class="slot-btn" id="s2" onclick="useSlot(2)">S2</button>
                <button class="slot-btn" id="s3" onclick="useSlot(3)">S3</button>
            </div>
            <input type="text" id="bg-input" placeholder="Img URL..." style="width:50%; padding:8px; background:#000; color:#fff; border:1px solid var(--border);">
            <button class="btn-action" onclick="saveBg()">Save</button>
        </div>
    </div>

    <div id="vocab-view" class="container">
        <div id="v-meta">WORD 1 OF 10</div>
        <div id="v-latin">Word</div>
        <div id="v-feedback" style="height:20px; font-weight:bold; font-size: 0.9rem; margin-bottom: 5px;"></div>
        <input type="text" id="vocab-input" placeholder="..." autocomplete="off">
        <div class="v-stat" id="v-streak">STREAK: 0</div>
        <div class="v-stat" id="v-best">BEST STREAK: 0</div>
        <div class="timer-bar" id="t-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="grammar-view" class="container">
        <h2 id="g-title">Table</h2>
        <div class="table-wrap"><table id="g-table"></table></div>
        <button class="btn-action" onclick="checkGrammar()">Check</button>
        <button class="btn-action" style="background:#4b5563;" onclick="resetGrammar()">Reset</button>
    </div>
</div>

<script>
const vocabData = { 
    1: [{l:"amō",e:"love, like"},{l:"dea",e:"goddess"},{l:"deus",e:"god"},{l:"et",e:"and, even"},{l:"etiam",e:"also, even"},{l:"fēmina",e:"woman"},{l:"fīlia",e:"daughter"},{l:"fīlius",e:"son"},{l:"homō",e:"man, human being, human"},{l:"īrātus",e:"angry"},{l:"lacrimō",e:"weep, cry"},{l:"laetus",e:"happy"},{l:"laudō",e:"praise"},{l:"līberī",e:"children"},{l:"māter",e:"mother"},{l:"multus",e:"much, many"},{l:"pater",e:"father"},{l:"pulcher",e:"beautiful, handsome"},{l:"pūniō",e:"punish"},{l:"rēgīna",e:"queen"},{l:"regō",e:"rule"},{l:"rēx",e:"king"},{l:"saepe",e:"often"},{l:"saevus",e:"savage, cruel"},{l:"sed",e:"but"},{l:"sum",e:"be, i am, am"},{l:"terreō",e:"frighten, terrify"},{l:"tum",e:"then"},{l:"uxor",e:"wife"}],
    2: [{l:"ad",e:"to, towards, at"},{l:"arma",e:"arms, weapons"},{l:"audāx",e:"bold, daring"},{l:"bellum",e:"war"},{l:"capiō",e:"take, catch, capture, make (a plan)"},{l:"contrā",e:"against"},{l:"corpus",e:"body"},{l:"currō",e:"run"},{l:"eō",e:"go"},{l:"flūmen",e:"river"},{l:"fortis",e:"brave, strong"},{l:"fortiter",e:"bravely, strongly"},{l:"gladius",e:"sword"},{l:"Graecus",e:"Greek"},{l:"hasta",e:"spear"},{l:"iaciō",e:"throw"},{l:"in",e:"into, onto, in, on"},{l:"ingēns",e:"huge"},{l:"inquit",e:"say, says"},{l:"interficiō",e:"kill"},{l:"maneō",e:"remain, stay"},{l:"nōn",e:"not"},{l:"per",e:"through, along"},{l:"perīculum",e:"danger"},{l:"prope",e:"near"},{l:"sagitta",e:"arrow"},{l:"silva",e:"wood"},{l:"timeō",e:"fear, be afraid"},{l:"trāns",e:"across"}],
    3: [{l:"ā, ab",e:"from, away from, by"},{l:"ascendō",e:"climb"},{l:"audiō",e:"hear, listen to"},{l:"auxilium",e:"help"},{l:"bonus",e:"good"},{l:"caelum",e:"sky, heaven"},{l:"celeriter",e:"quickly"},{l:"cōnspiciō",e:"catch sight of, notice"},{l:"cum",e:"with, when"},{l:"dē",e:"from, down from, about"},{l:"dēscendō",e:"go down, come down, descend"},{l:"difficilis",e:"difficult"},{l:"diū",e:"for a long time"},{l:"ē, ex",e:"from, out of, out from"},{l:"equus",e:"horse"},{l:"facilis",e:"easy"},{l:"fēlīx",e:"fortunate, happy, lucky"},{l:"in",e:"in, on, onto, into"},{l:"iubeō",e:"order"},{l:"magnus",e:"big, large, great"},{l:"malus",e:"evil, bad"},{l:"mare",e:"sea"},{l:"mōns",e:"mountain"},{l:"ōlim",e:"once, some time ago"},{l:"petō",e:"make for, seek, beg, ask for"},{l:"possum",e:"can, be able"},{l:"pugnō",e:"fight"},{l:"subitō",e:"suddenly"},{l:"tandem",e:"at last, finally"},{l:"terra",e:"ground, land, country, earth"}],
    4: [{l:"aedificō",e:"build"},{l:"ager",e:"field"},{l:"aurum",e:"gold"},{l:"crēdō",e:"believe, trust"},{l:"crūdēlis",e:"cruel"},{l:"cūr?",e:"why?"},{l:"dō",e:"give"},{l:"dōnum",e:"gift, present"},{l:"faciō",e:"make, do"},{l:"ferō",e:"bring, carry, bear"},{l:"habeō",e:"have, hold"},{l:"īra",e:"anger"},{l:"miser",e:"miserable, wretched, sad"},{l:"nōlō",e:"not want, refuse"},{l:"nōmen",e:"name"},{l:"nōnne?",e:"surely?, surely, surely..., surely...?"},{l:"num?",e:"surely not?, surely not, surely...not?, surely...not"},{l:"pecūnia",e:"money"},{l:"persuādeō",e:"persuade"},{l:"perterritus",e:"terrified"},{l:"pōnō",e:"put, place, set up"},{l:"quandō?",e:"when?, when"},{l:"quod",e:"because"},{l:"semper",e:"always"},{l:"tamen",e:"however"},{l:"templum",e:"temple"},{l:"trīstis",e:"sad"},{l:"ubi?",e:"where?, where, when?, when"},{l:"volō",e:"want, wish, be willing"}],
    5: [{l:"absum",e:"be absent, be away, be distant from"},{l:"adsum",e:"be here, be present"},{l:"agricola",e:"farmer"},{l:"ancilla",e:"female slave, slave girl, slave, slave woman"},{l:"aqua",e:"water"},{l:"bibō",e:"drink"},{l:"cēna",e:"dinner, meal"},{l:"cēterī",e:"the rest, the others, rest, others"},{l:"cibus",e:"food"},{l:"clāmō",e:"shout"},{l:"cōnsūmō",e:"eat, consume"},{l:"fessus",e:"tired"},{l:"festīnō",e:"hurry"},{l:"iterum",e:"again"},{l:"lūdus",e:"school, game, public games, festival"},{l:"magnopere",e:"greatly, very much"},{l:"mortuus",e:"dead"},{l:"mox",e:"soon"},{l:"nunc",e:"now"},{l:"parō",e:"prepare, provide"},{l:"rīdeō",e:"laugh, smile, laugh at"},{l:"sacer",e:"sacred"},{l:"servus",e:"slave, male slave, slave boy"},{l:"spectō",e:"look at, watch"},{l:"taberna",e:"shop, inn"},{l:"urbs",e:"city"},{l:"veniō",e:"come"},{l:"vīlla",e:"house, country villa, villa"},{l:"vīnum",e:"wine"}],
    6: [{l:"altus",e:"high, deep"},{l:"amīcus",e:"friend, male friend"},{l:"annus",e:"year"},{l:"dormiō",e:"sleep"},{l:"emō",e:"buy"},{l:"hīc",e:"here"},{l:"hōra",e:"hour"},{l:"iam",e:"now, already"},{l:"ibi",e:"there"},{l:"itaque",e:"and so, therefore"},{l:"iuvenis",e:"young man"},{l:"locus",e:"place"},{l:"meus",e:"my"},{l:"moneō",e:"warn, advise"},{l:"nōlī / nōlīte",e:"don't, do not"},{l:"noster",e:"our"},{l:"novus",e:"new"},{l:"numquam",e:"never"},{l:"ostendō",e:"show"},{l:"parvus",e:"small"},{l:"puella",e:"girl"},{l:"puer",e:"boy"},{l:"respondeō",e:"reply"},{l:"rogō",e:"ask, ask for"},{l:"sīc",e:"thus, in this way"},{l:"suus",e:"his, her, its, their"},{l:"tuus",e:"your, yours"},{l:"verbum",e:"word"},{l:"vester",e:"your, yours"},{l:"videō",e:"see"}],
    7: [{l:"ambulō",e:"walk"},{l:"antequam",e:"before"},{l:"cīvis",e:"citizen"},{l:"clārus",e:"famous, clear"},{l:"dīcō",e:"say, speak, tell"},{l:"domina",e:"mistress"},{l:"dominus",e:"master"},{l:"et ... et",e:"both ... and"},{l:"forum",e:"forum, market place"},{l:"habitō",e:"live"},{l:"hic",e:"this, these"},{l:"hortus",e:"garden"},{l:"ille",e:"that, those, he, she, it"},{l:"is",e:"he, she, it, that, those"},{l:"līberō",e:"set free"},{l:"lībertus",e:"freedman, ex-slave"},{l:"mūrus",e:"wall"},{l:"nūntius",e:"messenger"},{l:"omnis",e:"all, every"},{l:"paucī",e:"few, a few"},{l:"postquam",e:"after, when"},{l:"quamquam",e:"although"},{l:"quī",e:"who, which"},{l:"quis?",e:"who? what? which?"},{l:"quoque",e:"also, too"},{l:"salūtō",e:"greet"},{l:"senātor",e:"senator"},{l:"ubi",e:"when, where"},{l:"via",e:"street, road, way"}],
    8: [{l:"abeō",e:"go away"},{l:"adeō",e:"go to, approach"},{l:"appropinquō",e:"approach, come near to"},{l:"clāmor",e:"shout, shouting, noise"},{l:"conveniō",e:"come together, gather, meet"},{l:"cupiō",e:"want, desire"},{l:"ego",e:"I, me"},{l:"enim",e:"for"},{l:"epistula",e:"letter"},{l:"exeō",e:"go out from, go away, leave"},{l:"ferox",e:"fierce, ferocious"},{l:"frūstrā",e:"in vain"},{l:"ineō",e:"go into, enter"},{l:"labōrō",e:"work, toil, labor"},{l:"legō",e:"read, choose"},{l:"liber",e:"book"},{l:"longus",e:"long"},{l:"magis",e:"more"},{l:"magister",e:"teacher"},{l:"maior",e:"bigger, larger"},{l:"maximē",e:"very greatly"},{l:"maximus",e:"greatest, largest"},{l:"medius",e:"middle"},{l:"melior",e:"better"},{l:"minimus",e:"smallest, least"},{l:"minor",e:"smaller, less"},{l:"nōbilis",e:"of noble birth"},{l:"nōs",e:"we, us"},{l:"nōtus",e:"famous, well-known"},{l:"optimus",e:"best"},{l:"peior",e:"worse"},{l:"pereō",e:"die, perish"},{l:"pessimus",e:"worst"},{l:"plūrēs",e:"more"},{l:"plūrimus",e:"most, very many"},{l:"plūs",e:"more"},{l:"quam",e:"than, how"},{l:"redeō",e:"return"},{l:"scrībō",e:"write"},{l:"sē",e:"himself, herself, itself, themselves"},{l:"senex",e:"old man"},{l:"stultus",e:"stupid, foolish"},{l:"trānseō",e:"go over, cross"},{l:"tū",e:"you"},{l:"vir",e:"man, husband"},{l:"vōs",e:"you"}]
};

const grammar = {
    'hic': { t:"Hic & Ille (M/F Only)", h:["Hic M","Hic F","Ille M","Ille F"], r:["Nom s","Acc s","Nom p","Acc p"], k:[["hic","haec","ille","illa"],["hunc","hanc","illum","illam"],["hi","hae","illi","illae"],["hos","has","illos","illas"]]},
    'is': { t:"Is (No Nom. Sing.)", h:["Masc","Fem"], r:["Acc s","Dat s","Gen s","Abl s","Nom p","Acc p","Dat/Abl p","Gen p"], k:[["eum","eam"],["ei","ei"],["eius","eius"],["eo","ea"],["ei","eae"],["eos","eas"],["eis","eis"],["eorum","earum"]]},
    'qui': { t:"Qui (No Plural Neuter)", h:["Sing Masc","Sing Fem","Plur Masc","Plur Fem"], r:["Nom","Acc"], k:[["qui","quae","qui","quae"],["quem","quam","quos","quas"]]},
    'eo': { t:"Verb: Eo", h:["Pres","Perf","Impf","Plup"], r:["1s","2s","3s","1p","2p","3p"], k:[["eo","ii","ibam","ieram"],["is","isti","ibas","ieras"],["it","iit","ibat","ierat"],["imus","iimus","ibamus","ieramus"],["itis","istis","ibatis","ieratis"],["eunt","ierunt","ibant","ierant"]]},
    'sum': { t:"Verb: Sum", h:["Pres","Perf","Plup"], r:["1s","2s","3s","1p","2p","3p"], k:[["sum","fui","fueram"],["es","fuisti","fueras"],["est","fuit","fuerat"],["sumus","fuimus","fueramus"],["estis","fuistis","fueratis"],["sunt","fuerunt","fuerant"]]}
};

let pool = [], vIdx = 0, streak = 0, timer = null, lock = false, slot = 1;

function toggleTimerPref() { localStorage.setItem('sd_timer', document.getElementById('timer-toggle').checked); }
function useSlot(n) {
    slot = n;
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`s${n}`).classList.add('active');
    const val = localStorage.getItem(`bg_${n}`);
    if(val) { document.body.style.backgroundImage = `url('${val}')`; document.body.classList.add('custom-bg'); }
    else { document.body.style.backgroundImage = ''; document.body.classList.remove('custom-bg'); }
}
function saveBg() { localStorage.setItem(`bg_${slot}`, document.getElementById('bg-input').value); useSlot(slot); }

function startVocab(chs) {
    showView('vocab-view');
    pool = chs.flatMap(c => vocabData[c]).sort(() => Math.random() - 0.5);
    vIdx = 0; streak = 0; 
    document.getElementById('v-best').innerText = "BEST STREAK: " + (localStorage.getItem('vb_best') || 0);
    nextWord();
}

function nextWord() {
    if(vIdx >= pool.length) return goHome();
    document.getElementById('v-meta').innerText = `WORD ${vIdx+1} OF ${pool.length}`;
    document.getElementById('v-latin').innerText = pool[vIdx].l;
    document.getElementById('vocab-input').value = ""; document.getElementById('vocab-input').focus();
    document.getElementById('v-feedback').innerText = ""; lock = false;
    
    clearInterval(timer);
    if(document.getElementById('timer-toggle').checked) {
        document.getElementById('t-bar').style.display = "block";
        let t = 5000;
        timer = setInterval(() => {
            t -= 100; document.getElementById('timer-fill').style.width = (t/5000)*100 + "%";
            if(t <= 0) handleWrong();
        }, 100);
    } else { document.getElementById('t-bar').style.display = "none"; }
}

document.getElementById('vocab-input').onkeydown = (e) => {
    if(e.key === 'Enter' && !lock) {
        const val = e.target.value.toLowerCase().trim();
        const ans = pool[vIdx].e.toLowerCase().split(',').map(x => x.trim());
        if(ans.some(a => val === a)) {
            clearInterval(timer); streak++; vIdx++;
            if(streak > (localStorage.getItem('vb_best') || 0)) localStorage.setItem('vb_best', streak);
            document.getElementById('v-streak').innerText = "STREAK: " + streak;
            document.getElementById('v-feedback').innerText = "CORRECT";
            document.getElementById('v-feedback').style.color = "var(--ok)";
            lock = true; setTimeout(nextWord, 600);
        } else handleWrong();
    }
};

function handleWrong() {
    lock = true; clearInterval(timer);
    document.getElementById('v-feedback').innerText = "WRONG: " + pool[vIdx].e;
    document.getElementById('v-feedback').style.color = "var(--err)";
    streak = 0; document.getElementById('v-streak').innerText = "STREAK: 0";
    setTimeout(nextWord, 1500);
}

function loadGrammar(id) {
    showView('grammar-view'); activeG = id; const config = grammar[id];
    document.getElementById('g-title').innerText = config.t;
    let html = `<tr><th>Case/Per</th>${config.h.map(h => `<th>${h}</th>`).join('')}</tr>`;
    config.r.forEach((row, r) => {
        html += `<tr><td><b>${row}</b></td>`;
        config.k[r].forEach((v, c) => html += `<td><input type="text" class="grammar-input" id="g-${r}-${c}" autocomplete="off"></td>`);
        html += `</tr>`;
    });
    document.getElementById('g-table').innerHTML = html;
}

function checkGrammar() {
    grammar[activeG].k.forEach((row, r) => {
        row.forEach((val, c) => {
            const input = document.getElementById(`g-${r}-${c}`);
            input.parentNode.querySelectorAll('.ans-hint').forEach(h => h.remove());
            if(input.value.toLowerCase().trim() === val) input.className = "grammar-input correct";
            else {
                input.className = "grammar-input incorrect";
                const s = document.createElement('span'); s.className = 'ans-hint'; s.innerText = val;
                input.parentNode.appendChild(s);
            }
        });
    });
}

function resetGrammar() { loadGrammar(activeG); }
function showView(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome() { 
    showView('home-view'); 
    document.getElementById('timer-toggle').checked = localStorage.getItem('sd_timer') === 'true';
}
window.onload = () => { goHome(); useSlot(1); };
</script>
</body>
</html>
