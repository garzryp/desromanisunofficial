<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Romanis Unofficial | Latin Mastery</title>
    <style>
        :root {
            --bg: #0d1117; --side: #161b22; --card: #1c1f26; --text: #c9d1d9;
            --accent: #58a6ff; --border: #30363d; --err: #f85149; --ok: #3fb950; --gold: #d29922;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.4s ease; }
        
        body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
        body.custom-bg::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: -1; }

        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; z-index: 10; }
        .sidebar h2 { font-size: 0.8rem; color: #8b949e; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sidebar h2:hover { color: var(--accent); }
        .sidebar h2 span { font-size: 0.6rem; transition: transform 0.3s; }
        
        .logo-btn { background: none; border: none; padding: 0; cursor: pointer; text-align: left; width: 100%; }
        .title-link { text-decoration: none; color: var(--accent); transition: 0.2s; display: block; }
        
        .nav-btn { background: transparent; border: none; color: var(--text); text-align: left; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; width: 100%; }
        .nav-btn:hover { background: #21262d; color: var(--accent); }
        .nav-btn.active { background: #1f6feb; color: white; font-weight: bold; }

        .content { display: flex; flex-direction: column; gap: 5px; overflow: hidden; max-height: 1000px; transition: max-height 0.3s ease-out, opacity 0.3s; }
        .content.collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        .collapsed-arrow { transform: rotate(-90deg); }

        .main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 900px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; }
        .container.active { display: block; }

        h1 { margin-top: 0; color: white; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .instruction-box { background: rgba(210, 153, 34, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        th { background: #21262d; color: var(--accent); }
        .grammar-input { width: 90%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; text-align: center; font-size: 1.1rem; outline: none; }
        
        .vocab-ui { text-align: center; max-width: 500px; margin: 0 auto; }
        .latin-word { font-size: 2.5rem; font-weight: 700; color: #fff; margin: 20px 0; }
        .vocab-input { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 2px solid var(--border); background: #0d1117; color: white; outline: none; text-align: center; margin-bottom: 10px; }
        
        #timer-container { width: 100%; height: 8px; background: #111827; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        .feedback { font-weight: 600; margin: 10px 0; min-height: 1.5rem; }
        .correct { color: var(--ok); }
        .incorrect { color: var(--err); }
        .stats { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-top: 10px; }

        .btn-box { display: flex; gap: 15px; margin-top: 30px; justify-content: center; }
        button.action { background: #21262d; color: var(--accent); border: 1px solid var(--border); padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.action:hover { background: #30363d; }
        
        .theme-picker { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .theme-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: transform 0.2s; }
        .ans-hint { display: block; font-size: 0.75rem; color: var(--err); margin-top: 4px; font-weight: bold; }
        
        .credit { font-size: 0.8rem; color: #8b949e; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="sidebar">
    <button onclick="goHome()" class="logo-btn">
        <h1 style="font-size: 1.1rem; margin-bottom: 5px; color: var(--accent);">🏛️ De Romanis Unofficial</h1>
    </button>
    <p style="font-size: 0.7rem; color: #8b949e; margin-bottom: 20px; margin-top: 0;">by garzryp</p>
    
    <h2 onclick="toggleSection('vocab-menu')">Vocabulary <span id="vocab-menu-arrow" class="collapsed-arrow">▼</span></h2>
    <div id="vocab-menu" class="content collapsed">
        <button class="nav-btn" onclick="openVocab([1])">Chapter 1</button>
        <button class="nav-btn" onclick="openVocab([2])">Chapter 2</button>
        <button class="nav-btn" onclick="openVocab([3])">Chapter 3</button>
        <button class="nav-btn" onclick="openVocab([4])">Chapter 4</button>
        <button class="nav-btn" onclick="openVocab([5])">Chapter 5</button>
        <button class="nav-btn" onclick="openVocab([6])">Chapter 6</button>
        <button class="nav-btn" onclick="openVocab([7])">Chapter 7</button>
        <button class="nav-btn" onclick="openVocab([8])">Chapter 8</button>
        <button class="nav-btn" onclick="openVocab([1,2,3,4])">CH 1-4</button>
        <button class="nav-btn" onclick="openVocab([5,6,7,8])">CH 5-8</button>
        <button class="nav-btn" onclick="openVocab([1,2,3,4,5,6,7,8])">All Chapters</button>
    </div>

    <h2 onclick="toggleSection('grammar-menu')">Grammar <span id="grammar-menu-arrow" class="collapsed-arrow">▼</span></h2>
    <div id="grammar-menu" class="content collapsed">
        <button class="nav-btn" onclick="loadGrammar('perf-sys')">Perfect & Pluperfect</button>
        <button class="nav-btn" onclick="loadGrammar('verb-pres')">Present Indicative</button>
        <button class="nav-btn" onclick="loadGrammar('verb-impf')">Imperfect Indicative</button>
        <button class="nav-btn" onclick="loadGrammar('verb-subj')">Imperfect Subjunctive</button>
    </div>

    <h2 onclick="toggleSection('extra-menu')">Extras <span id="extra-menu-arrow" class="collapsed-arrow">▼</span></h2>
    <div id="extra-menu" class="content collapsed">
        <button class="nav-btn" onclick="loadGrammar('irr-eo')">Eo, Ire</button>
        <button class="nav-btn" onclick="loadGrammar('irr-volo')">Volo & Nolo</button>
        <button class="nav-btn" onclick="loadGrammar('pro-pers')">Personal (Ego/Tu)</button>
        <button class="nav-btn" onclick="loadGrammar('pro-demo')">Is, Ea, Id</button>
        <button class="nav-btn" onclick="loadGrammar('pro-hic')">Hic & Ille</button>
    </div>
</div>

<script>
    // ... existing logic ...

    window.onload = () => {
        // Apply saved theme on boot
        if(localStorage.getItem('latin-url-slot1')) setTheme('slot1');
        
        // Ensure we start on the home screen
        goHome();
    };
</script>

<div class="main">
    <div id="home-container" class="container active" style="text-align: center;">
        <h1>Welcome</h1>
        <p>Master Latin vocabulary and grammar from the De Romanis course.</p>
        
        <div style="margin: 40px 0; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px;">
            <h3>🖌️ Custom Background</h3>
            <input type="text" id="bg-url-input" class="vocab-input" placeholder="Paste image URL here..." style="max-width: 400px;">
            <div class="theme-picker">
                <div class="theme-dot" onclick="setTheme('default')" style="background: #0d1117;"></div>
                <div class="theme-dot" onclick="setTheme('slot1')" style="background: #374151;"></div>
                <div class="theme-dot" onclick="setTheme('slot2')" style="background: #374151;"></div>
            </div>
            <button class="action" onclick="saveToSlot()">Save Background to Slot</button>
        </div>

        <div style="margin-top:20px; font-size:0.9rem;">
            <label><input type="checkbox" id="timer-toggle"> Enable Sudden Death Timer</label>
        </div>
        
        <p class="credit">Version 2.0 • Created by garzryp</p>
    </div>

    <div id="grammar-container" class="container">
        <h1 id="view-title">Grammar</h1>
        <div id="instruction-container"></div>
        <table id="master-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
        <div class="btn-box">
            <button class="action" style="background: var(--accent); color: white; border: none;" onclick="checkGrammar()">Check Answers</button>
            <button class="action" onclick="resetGrammar()">Reset</button>
        </div>
    </div>

    <div id="vocab-container" class="container">
        <div class="vocab-ui">
            <h1 id="vocab-title">Vocabulary Quiz</h1>
            <div id="vocab-quiz-screen">
                <div id="timer-container"><div id="timer-bar"></div></div>
                <div class="stats" id="progress">WORD 1 OF X</div>
                <div class="latin-word" id="display-latin">---</div>
                <div class="feedback" id="feedback"></div>
                <input type="text" id="answer-input" class="vocab-input" placeholder="Type meaning..." autocomplete="off">
                <div class="stats" id="score-display">STREAK: 0</div>
                <button class="action" onclick="goHome()" style="margin-top: 20px;">Exit to Home</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Vocab and Grammar data (Truncated for brevity, keep your original full library here)
    const vocabLibrary = { 1: [{l:"amō",e:"love, like"},{l:"dea",e:"goddess"}], /* Add all your chapters back here */ };
    const grammarLibrary = { 'perf-sys': { title: "Perfect & Pluperfect", heads: ["Person", "Perfect", "Pluperfect"], keys: [["i", "eram"], ["isti", "eras"]] }, /* Add all your grammar back here */ };

    let curG = 'perf-sys', vPool = [], vIdx = 0, vScore = 0, timer;
    let selectedSlot = 'slot1';

    function goHome() {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById('home-container').classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        clearInterval(timer);
    }

    function loadGrammar(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById('grammar-container').classList.add('active');
        curG = id; const config = grammarLibrary[id];
        
        // Highlight active button
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.toggle('active', b.getAttribute('onclick')?.includes(`'${id}'`));
        });

        document.getElementById('view-title').innerText = config.title;
        document.getElementById('instruction-container').innerHTML = config.info ? `<div class="instruction-box">💡 <b>Rule:</b> ${config.info}</div>` : '';
        document.getElementById('table-head').innerHTML = `<tr>${config.heads.map(h => `<th>${h}</th>`).join('')}</tr>`;
        const body = document.getElementById('table-body'); body.innerHTML = '';
        const rows = config.labels || ["1s", "2s", "3s", "1p", "2p", "3p"];
        config.keys.forEach((row, r) => {
            let html = `<tr><td><b>${rows[r]}</b></td>`;
            row.forEach((val, c) => html += `<td><div id="cell-${r}-${c}"><input type="text" class="grammar-input" id="ans-${r}-${c}" data-row="${r}" data-col="${c}" autocomplete="off"></div></td>`);
            body.innerHTML += html + `</tr>`;
        });
    }

    function openVocab(chs) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById('vocab-container').classList.add('active');
        
        vPool = chs.flatMap(c => vocabLibrary[c]).sort(() => Math.random() - 0.5);
        vIdx = 0; vScore = 0; 
        document.getElementById('score-display').innerText = "STREAK: 0";
        showVWord();
    }

    function showVWord() {
        if (vIdx >= vPool.length) { 
            document.getElementById('display-latin').innerText = "Complete!";
            document.getElementById('answer-input').style.display = 'none';
            return; 
        }
        document.getElementById('answer-input').style.display = 'block';
        document.getElementById('progress').innerText = `WORD ${vIdx + 1} OF ${vPool.length}`;
        document.getElementById('display-latin').innerText = vPool[vIdx].l;
        const i = document.getElementById('answer-input'); i.value = ""; i.focus();
        if(document.getElementById('timer-toggle').checked) startVTimer();
    }

    function startVTimer() {
        clearInterval(timer); document.getElementById('timer-container').style.display = 'block';
        let rem = 100; timer = setInterval(() => { 
            rem -= 2; document.getElementById('timer-bar').style.width = rem + '%'; 
            if(rem <= 0) { 
                clearInterval(timer); 
                vIdx++; showVWord();
            } 
        }, 100);
    }

    document.getElementById('answer-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            const val = e.target.value.toLowerCase().trim();
            const correct = vPool[vIdx].e.toLowerCase().split(',').map(s => s.trim());
            const f = document.getElementById('feedback');
            clearInterval(timer);

            if (correct.includes(val)) { 
                f.innerText = "CORRECT!"; f.className = "feedback correct"; vScore++; vIdx++; 
                setTimeout(() => { f.innerText = ""; showVWord(); }, 600); 
            } else { 
                f.innerText = `WRONG: ${vPool[vIdx].e}`; f.className = "feedback incorrect"; vScore = 0; vIdx++; 
                setTimeout(() => { f.innerText = ""; showVWord(); }, 2000); 
            }
            document.getElementById('score-display').innerText = `STREAK: ${vScore}`;
        }
    });

    function setTheme(slot) {
        selectedSlot = slot;
        const url = localStorage.getItem(`latin-url-${slot}`);
        if(url && slot !== 'default') { 
            document.body.classList.add('custom-bg'); 
            document.body.style.backgroundImage = `url('${url}')`; 
        } else { 
            document.body.classList.remove('custom-bg'); 
            document.body.style.backgroundImage = 'none'; 
        }
    }

    function saveToSlot() {
        const url = document.getElementById('bg-url-input').value.trim();
        if (selectedSlot === 'default') { alert("Please select Slot 1 or 2 to save."); return; }
        if (url) {
            localStorage.setItem(`latin-url-${selectedSlot}`, url);
            setTheme(selectedSlot);
            alert("Background saved!");
        }
    }

    function toggleSection(id) {
        const menu = document.getElementById(id);
        const arrow = document.getElementById(id + '-arrow');
        menu.classList.toggle('collapsed');
        arrow.classList.toggle('collapsed-arrow');
    }

    window.onload = () => {
        // Load default saved background if exists
        if(localStorage.getItem('latin-url-slot1')) setTheme('slot1');
        // Close extras by default
        toggleSection('extra-menu');
    };
</script>
</body>
</html>
