<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Romanis Unofficial | Latin Mastery</title>
    <style>
        :root {
            --bg: #0d1117; --side: #161b22; --card: #1c1f26; --text: #c9d1d9;
            --accent: #58a6ff; --border: #30363d; --err: #f85149; --ok: #3fb950; --gold: #d29922;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        body.custom-bg::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), var(--bg-img);
            background-size: cover; background-position: center; z-index: -1; 
        }

        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { font-size: 0.8rem; color: #8b949e; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; }
        
        .nav-btn { background: transparent; border: none; color: var(--text); text-align: left; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; width: 100%; }
        .nav-btn:hover { background: #21262d; color: var(--accent); }
        .content { overflow: hidden; max-height: 1000px; transition: max-height 0.3s ease-out; }
        .content.collapsed { max-height: 0; }

        .main { flex: 1; overflow-y: auto; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; padding: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; text-align: center; }
        .container.active { display: block; }

        .vocab-input { width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 2px solid var(--border); background: #0d1117; color: white; outline: none; text-align: center; transition: 0.3s; box-sizing: border-box; }
        .latin-word { font-size: 3rem; font-weight: 700; color: #fff; margin: 20px 0; }
        
        #timer-container { width: 100%; height: 8px; background: #111827; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        
        .feedback { font-weight: 600; margin: 15px 0; min-height: 1.5rem; font-size: 1.1rem; }
        .correct { color: var(--ok); }
        .incorrect { color: var(--err); }
        .stats { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin: 5px 0; }
        
        .action { background: #21262d; color: var(--accent); border: 1px solid var(--border); padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .grammar-input { width: 90%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; text-align: center; outline: none; font-size: 1rem; }
        .ans-hint { display: block; font-size: 0.75rem; color: var(--err); margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <button onclick="goHome()" style="background:none; border:none; cursor:pointer; text-align:left; padding:0;">
        <h1 style="font-size: 1.1rem; color: var(--accent);">🏛️ De Romanis Unofficial</h1>
    </button>
    
    <h2 onclick="toggleSection('vocab-menu')">Vocabulary <span>▼</span></h2>

        <button class="nav-btn" onclick="openVocab([3])">Chapter 3</button>
        <button class="nav-btn" onclick="openVocab([4])">Chapter 4</button>
        <button class="nav-btn" onclick="openVocab([5])">Chapter 5</button>
        <button class="nav-btn" onclick="openVocab([6])">Chapter 6</button>
        <button class="nav-btn" onclick="openVocab([7])">Chapter 7</button>
        <button class="nav-btn" onclick="openVocab([8])">Chapter 8</button>

    </div>

    </div>
</div>

<div class="main">
    <div id="home-container" class="container active">

        <div style="margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px;">

        <table>

        <div style="margin-top:20px;">
            <button class="action" onclick="checkGrammar()" style="background:var(--accent); color:white;">Check Answers</button>
            <button class="action" onclick="goHome()">Back</button>
        </div>
    </div>
</div>

    7: [{l:"ambulō",e:"walk"},{l:"antequam",e:"before"},{l:"cīvis",e:"citizen"},{l:"clārus",e:"famous, clear"},{l:"dīcō",e:"say, speak, tell"},{l:"domina",e:"mistress"},{l:"dominus",e:"master"},{l:"et ... et",e:"both ... and, both and, both...and"},{l:"forum",e:"forum, market place"},{l:"habitō",e:"live"},{l:"hic",e:"this, these"},{l:"hortus",e:"garden"},{l:"ille",e:"that, those, he, she, it"},{l:"is",e:"he, she, it, that, those"},{l:"līberō",e:"set free"},{l:"lībertus",e:"freedman, x-slave"},{l:"mūrus",e:"wall"},{l:"nūntius",e:"messenger"},{l:"omnis",e:"all, every"},{l:"paucī",e:"few, a few"},{l:"postquam",e:"after, when"},{l:"quamquam",e:"although"},{l:"quī",e:"who, which"},{l:"quis?",e:"who? what? which?"},{l:"quoque",e:"also, too"},{l:"salūtō",e:"greet"},{l:"senātor",e:"senator"},{l:"ubi",e:"when, where"},{l:"via",e:"street, road, way"}],
    8: [{l:"abeō",e:"go away"},{l:"adeō",e:"go to, approach"},{l:"appropinquō",e:"approach, come near to"},{l:"clāmor",e:"shout, shouting, noise"},{l:"conveniō",e:"come together, gather, meet"},{l:"cupiō",e:"want, desire"},{l:"ego",e:"I, me"},{l:"enim",e:"for"},{l:"epistula",e:"letter"},{l:"exeō",e:"go out from, go away, go out, exit, leave"},{l:"ferox",e:"fierce, ferocious"},{l:"frūstrā",e:"in vain"},{l:"ineō",e:"go into, enter"},{l:"labōrō",e:"work, toil, labor, labour"},{l:"legō",e:"read, choose"},{l:"liber",e:"book"},{l:"longus",e:"long"},{l:"magis",e:"more"},{l:"magister",e:"teacher"},{l:"maior",e:"bigger, larger, greater"},{l:"maximē",e:"very greatly"},{l:"maximus",e:"greatest, largest, biggest"},{l:"medius",e:"middle"},{l:"melior",e:"better"},{l:"minimus",e:"smallest, least"},{l:"minor",e:"smaller, less"},{l:"nōbilis",e:"of noble birth, renowned"},{l:"nōs",e:"we, us"},{l:"nōtus",e:"famous, well-known"},{l:"optimus",e:"best"},{l:"peior",e:"worse"},{l:"pereō",e:"die, perish"},{l:"pessimus",e:"worst"},{l:"plūrēs",e:"more"},{l:"plūrimus",e:"most, very many"},{l:"plūs",e:"more"},{l:"quam",e:"than, how, as possible"},{l:"redeō",e:"go back, come back, return"},{l:"scrībō",e:"write"},{l:"sē",e:"himself, herself, itself, themselves"},{l:"senex",e:"old man"},{l:"stultus",e:"stupid, foolish"},{l:"trānseō",e:"go over, cross"},{l:"tū",e:"you"},{l:"vir",e:"man, husband"},{l:"vōs",e:"you, you (plural)"}]
};

const grammarLibrary = {
    'perf-sys': { title: "Perfect & Pluperfect", info: "Integration: Look at the 3rd principal part and replace the 'i' with these endings.", heads: ["Person", "Perfect", "Pluperfect"], keys: [["i", "eram"], ["isti", "eras"], ["it", "erat"], ["imus", "eramus"], ["istis", "eratis"], ["erunt", "erant"]] },
    'verb-pres': { title: "Present Indicative", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["o","eo","o","io"], ["as","es","is","is"], ["at","et","it","it"], ["amus","emus","imus","imus"], ["atis","etis","itis","itis"], ["ant","ent","unt","iunt"]] },
    'verb-impf': { title: "Imperfect Indicative", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["abam","ebam","ebam","iebam"], ["abas","ebas","ebas","iebas"], ["abat","ebat","ebat","iebat"], ["abamus","ebamus","ebamus","iebamus"], ["abatis","ebatis","ebatis","iebatis"], ["abant","ebant","ebant","iebant"]] },
    'verb-subj': { title: "Imperfect Subjunctive", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["arem","erem","erem","irem"], ["ares","eres","eres","ires"], ["aret","eret","eret","iret"], ["aremus","eremus","eremus","iremus"], ["aretis","eretis","eretis","iretis"], ["arent","erent","erent","irent"]] },
    'irr-eo': { title: "Eo, Ire (To Go)", heads: ["Person", "Pres", "Impf", "Perf", "Plup"], keys: [["eo","ibam","ii","ieram"], ["is","ibas","isti","ieras"], ["it","ibat","iit","ierat"], ["imus","ibamus","iimus","ieramus"], ["itis","ibatis","istis","ieratis"], ["eunt","ibant","ierunt","ierant"]] },
    'irr-volo': { title: "Volo & Nolo", heads: ["Person", "Volo", "Nolo"], keys: [["volo","nolo"], ["vis","non vis"], ["vult","non vult"], ["volumus","nolumus"], ["vultis","non vultis"], ["volunt","nolunt"]] }
};

// --- APP STATE ---
let vPool = [], vIdx = 0, vScore = 0, vBest = localStorage.getItem('latin-best-streak') || 0;
let wrongPile = [], timerInterval, curG = null;

// --- UTILS ---
function clean(s) { 
    return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); 
}

function isNear(s1, s2) {
    s1 = clean(s1); s2 = clean(s2);
    if (Math.abs(s1.length - s2.length) > 1) return false;
    let err = 0, i = 0, j = 0;
    while(i<s1.length && j<s2.length) {
        if(s1[i]!==s2[j]) { err++; if(s1.length>s2.length) i++; else if(s2.length>s1.length) j++; else {i++;j++;} }
        else {i++;j++;}
    }
    return (err + (s1.length-i) + (s2.length-j)) <= 1;
}

// --- NAVIGATION ---
function toggleSection(id) {
    document.querySelectorAll('.content').forEach(c => {
        if(c.id !== id) c.classList.add('collapsed');
    });
    document.getElementById(id).classList.toggle('collapsed');
}

function goHome() {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('home-container').classList.add('active');
    clearInterval(timerInterval);
}

// --- VOCABULARY QUIZ ---
function openVocab(chs) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('vocab-container').classList.add('active');
    vPool = chs.flatMap(c => vocabLibrary[c]).sort(() => Math.random() - 0.5);
    vIdx = 0; vScore = 0; wrongPile = [];
    document.getElementById('best-display').innerText = `BEST STREAK: ${vBest}`;
    showVWord();
}

function showVWord() {
    const input = document.getElementById('answer-input');
    if(vIdx >= vPool.length) {
        if(wrongPile.length > 0) {
            vPool = [...wrongPile]; wrongPile = []; vIdx = 0;
            document.getElementById('feedback').innerHTML = `<span style="color:var(--gold)">Retrying missed words...</span>`;
            setTimeout(showVWord, 1500); return;
        }
        document.getElementById('display-latin').innerText = "Victory! 🏛️";
        input.style.display = 'none'; return;
    }
    document.getElementById('progress').innerText = `WORD ${vIdx+1} OF ${vPool.length} ${wrongPile.length > 0 ? '(+'+wrongPile.length+' missed)' : ''}`;
    document.getElementById('display-latin').innerText = vPool[vIdx].l;
    input.value = ""; input.disabled = false; input.style.borderColor = "var(--border)";
    input.focus(); document.getElementById('feedback').innerText = "";
    if(document.getElementById('timer-toggle').checked) startTimer();
}

document.getElementById('answer-input').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') {
        const input = e.target; if(input.disabled) return;
        const user = input.value.trim();
        const correctList = vPool[vIdx].e.split(',').map(s => s.trim());
        const isCorrect = correctList.some(ans => clean(user) === clean(ans));
        const isAlmost = !isCorrect && user !== "" && correctList.some(ans => isNear(user, ans));

        clearInterval(timerInterval);
        input.disabled = true;

        if(isCorrect) {
            input.style.borderColor = "var(--ok)";
            document.getElementById('feedback').innerHTML = `<span class="correct">Correct</span>`;
            vScore++; vIdx++;
            if(vScore > vBest) { vBest = vScore; localStorage.setItem('latin-best-streak', vBest); }
            setTimeout(showVWord, 800);
        } else if(isAlmost) {
            input.style.borderColor = "var(--gold)";
            document.getElementById('feedback').innerHTML = `<span style="color:var(--gold)">Close! Try again.</span>`;
            input.disabled = false; input.focus();
        } else {
            input.style.borderColor = "var(--err)";
            document.getElementById('feedback').innerHTML = `<span class="incorrect">Incorrect: ${vPool[vIdx].e}</span>`;
            wrongPile.push(vPool[vIdx]); vScore = 0; vIdx++;
            setTimeout(showVWord, 2500);
        }
        document.getElementById('score-display').innerText = `STREAK: ${vScore}`;
        document.getElementById('best-display').innerText = `BEST STREAK: ${vBest}`;
    }
});

function startTimer() {
    const bar = document.getElementById('timer-bar');
    document.getElementById('timer-container').style.display = 'block';
    let w = 100; clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        w -= 1.5; bar.style.width = w + "%";
        if(w <= 0) { clearInterval(timerInterval); document.getElementById('answer-input').dispatchEvent(new KeyboardEvent('keydown', {'key':'Enter'})); }
    }, 100);
}

// --- GRAMMAR LOGIC ---
function loadGrammar(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('grammar-container').classList.add('active');
    curG = id; 
    const config = grammarLibrary[id];
    
    document.getElementById('view-title').innerText = config.title;
    document.getElementById('instruction-container').innerHTML = config.info ? `<div style="background: rgba(210, 153, 34, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px;">💡 ${config.info}</div>` : '';
    document.getElementById('table-head').innerHTML = `<tr>${config.heads.map(h => `<th>${h}</th>`).join('')}</tr>`;
    
    const body = document.getElementById('table-body'); 
    body.innerHTML = '';
    const rows = ["1s", "2s", "3s", "1p", "2p", "3p"];
    
    config.keys.forEach((row, r) => {
        let html = `<tr><td><b>${rows[r]}</b></td>`;
        row.forEach((val, c) => {
            html += `<td><div id="gcell-${r}-${c}"><input type="text" class="grammar-input" id="gans-${r}-${c}" autocomplete="off"></div></td>`;
        });
        body.innerHTML += html + `</tr>`;
    });
}

function checkGrammar() {
    const config = grammarLibrary[curG];
    config.keys.forEach((row, r) => {
        row.forEach((correctVal, c) => {
            const input = document.getElementById(`gans-${r}-${c}`);
            const cell = document.getElementById(`gcell-${r}-${c}`);
            const userVal = clean(input.value);
            const cleanCorrect = clean(correctVal);
            
            const oldHint = cell.querySelector('.ans-hint');
            if (oldHint) oldHint.remove();

            if (userVal === cleanCorrect) {
                input.style.color = "var(--ok)";
            } else {
                input.style.color = "var(--err)";
                const hint = document.createElement('span');
                hint.className = 'ans-hint';
                hint.innerText = correctVal;
                cell.appendChild(hint);
            }
        });
    });
}

// --- TABLE VIEW ---
function showFullTable(chs) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('table-view-container').classList.add('active');
    const body = document.getElementById('vocab-list-body');
    body.innerHTML = '';
    chs.forEach(ch => {
        vocabLibrary[ch].forEach(w => {
            const r = document.createElement('tr');
            r.innerHTML = `<td style="color:var(--accent); font-weight:bold; text-align:left;">${w.l}</td><td style="text-align:left;">${w.e}</td><td>${ch}</td>`;
            body.appendChild(r);
        });
    });
}

// --- THEME ---
function saveBg() {
    const url = document.getElementById('bg-url-input').value;
    if(url) {
        localStorage.setItem('latin-bg', url);
        document.body.classList.add('custom-bg');
        document.body.style.setProperty('--bg-img', `url('${url}')`);
    }
}

window.onload = () => {
    const saved = localStorage.getItem('latin-bg');
    if(saved) {
        document.body.classList.add('custom-bg');
        document.body.style.setProperty('--bg-img', `url('${saved}')`);
    }
    goHome();
};
</script>
