<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin Mastery - Ultimate Edition</title>
    <style>
        :root {
            --bg: #0f111a; --side: #161b22; --card: #1c1f26; --text: #d1d5db;
            --accent: #3b82f6; --border: #2d333d; --err: #f87171; --ok: #34d399;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex-shrink: 0; }
        .sidebar h2 { font-size: 0.8rem; color: #6b7280; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn { background: transparent; border: none; color: var(--text); text-align: left; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .nav-btn:hover { background: #2d333d; color: var(--accent); }

        /* Main Content */
        .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; overflow-y: auto; }
        body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
        body.custom-bg::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 0; }

        .container { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); width: 95%; max-width: 850px; text-align: center; border: 1px solid var(--border); position: relative; z-index: 1; display: none; }
        .container.active { display: block; }

        /* Vocab Elements */
        .latin-word { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 1rem; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 1.1rem; border: 2px solid var(--border); border-radius: 8px; background: #0f111a; color: #fff; outline: none; text-align: center; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.2); }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; font-size: 0.9rem; }
        th { background: #111827; color: var(--accent); }
        .grammar-input { width: 90%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; text-align: center; outline: none; font-size: 0.95rem; }
        .ans-hint { display: block; font-size: 0.7rem; color: var(--err); margin-top: 2px; font-weight: bold; }
        .correct { border-bottom: 2px solid var(--ok) !important; color: var(--ok); }
        .incorrect { border-bottom: 2px solid var(--err) !important; color: var(--err); }

        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 style="color: var(--accent); font-size: 1.2rem; margin-bottom: 0;">🏛️ De Romanis</h1>
    <p style="font-size: 0.7rem; color: #6b7280; margin-bottom: 20px;">by garzryp</p>
    
    <h2>Vocabulary</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button class="nav-btn" onclick="startVocab([1])">CH 1</button><button class="nav-btn" onclick="startVocab([2])">CH 2</button>
        <button class="nav-btn" onclick="startVocab([3])">CH 3</button><button class="nav-btn" onclick="startVocab([4])">CH 4</button>
        <button class="nav-btn" onclick="startVocab([5])">CH 5</button><button class="nav-btn" onclick="startVocab([6])">CH 6</button>
        <button class="nav-btn" onclick="startVocab([7])">CH 7</button><button class="nav-btn" onclick="startVocab([8])">CH 8</button>
    </div>
    <button class="nav-btn" onclick="startVocab([1,2,3,4])" style="margin-top:5px; color: var(--accent);">CH 1-4</button>
    <button class="nav-btn" onclick="startVocab([5,6,7,8])" style="color: var(--accent);">CH 5-8</button>
    <button class="nav-btn" onclick="startVocab([1,2,3,4,5,6,7,8])" style="font-weight:bold;">ALL VOCAB</button>

    <h2>Nouns & Pronouns</h2>
    <button class="nav-btn" onclick="loadGrammar('noun-decl')">Declension Endings</button>
    <button class="nav-btn" onclick="loadGrammar('is')">Is, Ea, Id</button>
    <button class="nav-btn" onclick="loadGrammar('hic')">Hic, Haec, Hoc</button>
    <button class="nav-btn" onclick="loadGrammar('qui')">Qui, Quae, Quod</button>

    <h2>Verbs</h2>
    <button class="nav-btn" onclick="loadGrammar('verb-pres')">Present Indicative</button>
    <button class="nav-btn" onclick="loadGrammar('verb-impf')">Imperfect Indicative</button>
    <button class="nav-btn" onclick="loadGrammar('verb-subj')">Imperfect Subjunctive</button>
    <button class="nav-btn" onclick="loadGrammar('perf-sys')">Perfect System</button>
    <button class="nav-btn" onclick="loadGrammar('irreg')">Sum & Eo (Irregulars)</button>
</div>

<div class="main">
    <div id="home-view" class="container active">
        <h1>Select a chapter or table</h1>
        <p>Ready to grind?</p>
        <div style="margin-top:30px;"><input type="text" id="bg-input" placeholder="Paste Background URL..."><button class="btn-action" onclick="saveBg()">Apply Bg</button></div>
    </div>

    <div id="vocab-view" class="container">
        <div id="vocab-progress" style="font-size: 0.8rem; color: #6b7280; margin-bottom: 10px;">WORD 1 OF X</div>
        <div class="latin-word" id="vocab-latin">---</div>
        <div id="vocab-feedback" style="min-height: 1.5rem; margin-bottom: 1rem; font-weight: bold;"></div>
        <input type="text" id="vocab-input" placeholder="Type meaning..." autocomplete="off">
        <div id="vocab-stats" style="margin-top: 20px; font-size: 0.8rem;">STREAK: 0</div>
        <button class="btn-action" onclick="goHome()" style="background:#2d333d;">Exit</button>
    </div>

    <div id="grammar-view" class="container">
        <h1 id="grammar-title">Table</h1>
        <div style="overflow-x: auto;"><table id="g-table"><thead id="g-head"></thead><tbody id="g-body"></tbody></table></div>
        <button class="btn-action" onclick="checkGrammar()">Check Answers</button>
        <button class="btn-action" onclick="goHome()" style="background:#2d333d;">Back</button>
    </div>
</div>

let activePool = [], vIdx = 0, vStreak = 0, curG = '';

function goHome() { 
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('home-view').classList.add('active');
}

function startVocab(chs) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('vocab-view').classList.add('active');
    activePool = chs.flatMap(c => vocabData[c] || []).sort(() => Math.random() - 0.5);
    vIdx = 0; vStreak = 0; nextWord();
}

function nextWord() {
    if(vIdx >= activePool.length) { document.getElementById('vocab-latin').innerText = "CHAPTER COMPLETE!"; return; }
    document.getElementById('vocab-progress').innerText = `WORD ${vIdx + 1} OF ${activePool.length}`;
    document.getElementById('vocab-latin').innerText = activePool[vIdx].l;
    document.getElementById('vocab-input').value = ""; document.getElementById('vocab-input').focus();
    document.getElementById('vocab-feedback').innerText = "";
}

document.getElementById('vocab-input').addEventListener('keypress', e => {
    if(e.key === 'Enter') {
        const val = e.target.value.toLowerCase().trim();
        const answers = activePool[vIdx].e.toLowerCase().split(',').map(s => s.trim());
        if(answers.some(a => val === a || val === a.replace(/\(.*?\)/g, '').trim())) {
            vStreak++; vIdx++; document.getElementById('vocab-feedback').innerText = "CORRECT";
            document.getElementById('vocab-feedback').style.color = "var(--ok)";
            setTimeout(nextWord, 500);
        } else {
            vStreak = 0; document.getElementById('vocab-feedback').innerText = `WRONG: ${activePool[vIdx].e}`;
            document.getElementById('vocab-feedback').style.color = "var(--err)";
        }
        document.getElementById('vocab-stats').innerText = `STREAK: ${vStreak}`;
    }
});

function loadGrammar(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('grammar-view').classList.add('active');
    curG = id; const config = grammarLibrary[id];
    document.getElementById('grammar-title').innerText = config.title;
    document.getElementById('g-head').innerHTML = `<tr><th>---</th>${config.heads.slice(1).map(h => `<th>${h}</th>`).join('')}</tr>`;
    const body = document.getElementById('g-body'); body.innerHTML = '';
    config.keys.forEach((row, r) => {
        let html = `<tr><td><b>${config.labels[r]}</b></td>`;
        row.forEach((val, c) => html += `<td><div id="gc-${r}-${c}"><input type="text" class="grammar-input" id="ga-${r}-${c}" autocomplete="off"></div></td>`);
        body.innerHTML += html + `</tr>`;
    });
}

function checkGrammar() {
    const config = grammarLibrary[curG];
    config.keys.forEach((row, r) => {
        row.forEach((val, c) => {
            const input = document.getElementById(`ga-${r}-${c}`);
            const cell = document.getElementById(`gc-${r}-${c}`);
            cell.querySelectorAll('.ans-hint').forEach(h => h.remove());
            if(input.value.trim().toLowerCase() === val.trim().toLowerCase()) {
                input.className = "grammar-input correct";
            } else {
                input.className = "grammar-input incorrect";
                const hint = document.createElement('span'); hint.className = 'ans-hint'; hint.innerText = val;
                cell.appendChild(hint);
            }
        });
    });
}

function saveBg() { const url = document.getElementById('bg-input').value; if(url) { localStorage.setItem('latin-bg', url); applyBg(url); } }
function applyBg(url) { document.body.classList.add('custom-bg'); document.body.style.backgroundImage = `url('${url}')`; }
window.onload = () => { if(localStorage.getItem('latin-bg')) applyBg(localStorage.getItem('latin-bg')); };
</script>
</body>
</html>
