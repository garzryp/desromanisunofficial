<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Romanis Unofficial | Latin Mastery</title>
    <style>
        :root {
            --bg: #0d1117; --side: #161b22; --card: #1c1f26; --text: #c9d1d9;
            --accent: #58a6ff; --border: #30363d; --err: #f85149; --ok: #3fb950; --gold: #d29922;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        body.custom-bg::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), var(--bg-img);
            background-size: cover; background-position: center; z-index: -1; 
        }

        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; z-index: 10; flex-shrink: 0; }
        .sidebar h2 { font-size: 0.8rem; color: #8b949e; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; }
        
        .nav-btn { background: transparent; border: none; color: var(--text); text-align: left; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; width: 100%; }
        .nav-btn:hover { background: #21262d; color: var(--accent); }
        .content { overflow: hidden; max-height: 1000px; transition: max-height 0.3s ease-out; }
        .content.collapsed { max-height: 0; }

        .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; overflow-y: auto; }
        .container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; padding: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; text-align: center; }
        .container.active { display: block; }

        .vocab-input { width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 2px solid var(--border); background: #0d1117; color: white; outline: none; text-align: center; transition: 0.3s; box-sizing: border-box; }
        .latin-word { font-size: 3.5rem; font-weight: 700; color: #fff; margin: 20px 0; }
        
        #timer-container { width: 100%; height: 8px; background: #111827; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        
        .feedback { font-weight: 600; margin: 15px 0; min-height: 1.6rem; font-size: 1.1rem; }
        .correct { color: var(--ok); }
        .incorrect { color: var(--err); }
        .warning { color: var(--gold); }
        .stats { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin: 5px 0; }
        
        .action { background: #21262d; color: var(--accent); border: 1px solid var(--border); padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .bg-slot { padding: 8px; margin: 5px; border: 1px solid var(--border); border-radius: 4px; background: #0d1117; cursor: pointer; color: var(--text); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        .grammar-input { width: 90%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; text-align: center; outline: none; }
        .ans-hint { display: block; font-size: 0.7rem; color: var(--err); margin-top: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <button onclick="goHome()" style="background:none; border:none; cursor:pointer; text-align:left; padding:0;">

        <p style="font-size: 0.65rem; color: #8b949e; margin: 0 0 10px 5px;">by garzryp</p>
    </button>
    
    <h2 onclick="toggleSection('vocab-menu')">Vocabulary <span>▼</span></h2>

        <button class="nav-btn" onclick="openVocab([2])">Chapter 2</button>

    <div id="grammar-menu" class="content collapsed">
        <button class="nav-btn" onclick="loadGrammar('hic')">Hic, Haec, Hoc</button>
        <button class="nav-btn" onclick="loadGrammar('ille')">Ille, Illa, Illud</button>
        <button class="nav-btn" onclick="loadGrammar('is')">Is, Ea, Id</button>
        <button class="nav-btn" onclick="loadGrammar('qui')">Qui, Quae, Quod</button>
        <button class="nav-btn" onclick="loadGrammar('perf-sys')">Perfect & Pluperfect</button>
        <button class="nav-btn" onclick="loadGrammar('verb-pres')">Present Indicative</button>

    <h2 onclick="toggleSection('table-menu')">Vocab Table <span>▼</span></h2>

        <button class="nav-btn" onclick="showFullTable([1,2,3,4,5,6,7,8])">View All List</button>
    </div>
</div>

<div class="main">
    <div id="home-container" class="container active">
        <h1>Welcome</h1>
        <p>Master Latin vocabulary and grammar.</p>
        
        <div style="margin: 30px 0; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 10px;">
            <h3>🖌️ Background Slots</h3>

        <div style="margin-top:20px;">
            <button class="action" onclick="checkGrammar()" style="background:var(--accent); color:white;">Check</button>
            <button class="action" onclick="goHome()">Back</button>
        </div>
    </div>

    <div id="table-view-container" class="container" style="max-width: 800px;">

        </div>
        <button class="action" onclick="goHome()">Back</button>
    </div>
</div>

meet"},{l:"cupiō",e:"want, desire"},{l:"ego",e:"I, me"},{l:"enim",e:"for"},{l:"epistula",e:"letter"},{l:"exeō",e:"go out from, go away, go out, exit, leave"},{l:"ferox",e:"fierce, ferocious"},{l:"frūstrā",e:"in vain"},{l:"ineō",e:"go into, enter"},{l:"labōrō",e:"work, toil, labor, labour"},{l:"legō",e:"read, choose"},{l:"liber",e:"book"},{l:"longus",e:"long"},{l:"magis",e:"more"},{l:"magister",e:"teacher"},{l:"maior",e:"bigger, larger, greater"},{l:"maximē",e:"very greatly"},{l:"maximus",e:"greatest, largest, biggest"},{l:"medius",e:"middle"},{l:"melior",e:"better"},{l:"minimus",e:"smallest, least"},{l:"minor",e:"smaller, less"},{l:"nōbilis",e:"of noble birth, renowned"},{l:"nōs",e:"we, us"},{l:"nōtus",e:"famous, well-known"},{l:"optimus",e:"best"},{l:"peior",e:"worse"},{l:"pereō",e:"die, perish"},{l:"pessimus",e:"worst"},{l:"plūrēs",e:"more"},{l:"plūrimus",e:"most, very many"},{l:"plūs",e:"more"},{l:"quam",e:"than, how, as possible"},{l:"redeō",e:"go back, come back, return"},{l:"scrībō",e:"write"},{l:"sē",e:"himself, herself, itself, themselves"},{l:"senex",e:"old man"},{l:"stultus",e:"stupid, foolish"},{l:"trānseō",e:"go over, cross"},{l:"tū",e:"you"},{l:"vir",e:"man, husband"},{l:"vōs",e:"you, you (plural)"}] };

const grammarLibrary = {
    'hic': { title:"Hic, Haec, Hoc", heads:["Case","Masc","Fem","Neut"], keys:[["hic","haec","hoc"],["hunc","hanc","hoc"],["huius","huius","huius"],["huic","huic","huic"],["hoc","hac","hoc"],["hi","hae","haec"],["hos","has","haec"],["horum","harum","horum"],["his","his","his"],["his","his","his"]], labels:["Nom s","Acc s","Gen s","Dat s","Abl s","Nom p","Acc p","Gen p","Dat p","Abl p"] },
    'ille': { title:"Ille, Illa, Illud", heads:["Case","Masc","Fem","Neut"], keys:[["ille","illa","illud"],["illum","illam","illud"],["illius","illius","illius"],["illi","illi","illi"],["illo","illa","illo"],["illi","illae","illa"],["illos","illas","illa"],["illorum","illarum","illorum"],["illis","illis","illis"],["illis","illis","illis"]], labels:["Nom s","Acc s","Gen s","Dat s","Abl s","Nom p","Acc p","Gen p","Dat p","Abl p"] },
    'is': { title:"Is, Ea, Id", heads:["Case","Masc","Fem","Neut"], keys:[["is","ea","id"],["eum","eam","id"],["eius","eius","eius"],["ei","ei","ei"],["eo","ea","eo"],["ei","eae","ea"],["eos","eas","ea"],["eorum","earum","eorum"],["eis","eis","eis"],["eis","eis","eis"]], labels:["Nom s","Acc s","Gen s","Dat s","Abl s","Nom p","Acc p","Gen p","Dat p","Abl p"] },
    'qui': { title:"Qui, Quae, Quod", heads:["Case","Masc","Fem","Neut"], keys:[["qui","quae","quod"],["quem","quam","quod"],["cuius","cuius","cuius"],["cui","cui","cui"],["quo","qua","quo"],["qui","quae","quae"],["quos","quas","quae"],["quorum","quarum","quorum"],["quibus","quibus","quibus"],["quibus","quibus","quibus"]], labels:["Nom s","Acc s","Gen s","Dat s","Abl s","Nom p","Acc p","Gen p","Dat p","Abl p"] },
    'perf-sys': { title: "Perfect & Pluperfect", heads: ["Person", "Perfect", "Pluperfect"], keys: [["i","eram"],["isti","eras"],["it","erat"],["imus","eramus"],["istis","eratis"],["erunt","erant"]], labels:["1s","2s","3s","1p","2p","3p"] },
    'verb-pres': { title: "Present Indicative", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["o","eo","o","io"],["as","es","is","is"],["at","et","it","it"],["amus","emus","imus","imus"],["atis","etis","itis","itis"],["ant","ent","unt","iunt"]], labels:["1s","2s","3s","1p","2p","3p"] }
};

// --- LOGIC ---
let vPool=[], vIdx=0, vScore=0, vBest=localStorage.getItem('latin-best-streak')||0, wrongPile=[], timerInterval, curG=null;

function clean(s) { return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
function isNear(s1,s2){ s1=clean(s1); s2=clean(s2); if(Math.abs(s1.length-s2.length)>1) return false; let e=0,i=0,j=0; while(i<s1.length&&j<s2.length){ if(s1[i]!==s2[j]){ e++; if(s1.length>s2.length)i++; else if(s2.length>s1.length)j++; else {i++;j++;} } else {i++;j++;} } return (e+(s1.length-i)+(s2.length-j))<=1; }

function toggleSection(id) { document.querySelectorAll('.content').forEach(c=>{ if(c.id!==id)c.classList.add('collapsed'); }); document.getElementById(id).classList.toggle('collapsed'); }
function goHome() { document.querySelectorAll('.container').forEach(c=>c.classList.remove('active')); document.getElementById('home-container').classList.add('active'); clearInterval(timerInterval); }

function openVocab(chs) { document.querySelectorAll('.container').forEach(c=>c.classList.remove('active')); document.getElementById('vocab-container').classList.add('active'); vPool=chs.flatMap(c=>vocabLibrary[c]).sort(()=>Math.random()-0.5); vIdx=0; vScore=0; wrongPile=[]; document.getElementById('best-display').innerText=`BEST STREAK: ${vBest}`; showVWord(); }
function showVWord() { const input=document.getElementById('answer-input'); if(vIdx>=vPool.length){ if(wrongPile.length>0){ vPool=[...wrongPile]; wrongPile=[]; vIdx=0; document.getElementById('feedback').innerHTML=`<span style="color:var(--gold)">Retrying missed words...</span>`; setTimeout(showVWord,1500); return; } document.getElementById('display-latin').innerText="Victory! 🏛️"; input.style.display='none'; return; } document.getElementById('progress').innerText=`WORD ${vIdx+1} OF ${vPool.length} ${wrongPile.length>0?'(+'+wrongPile.length+' missed)':''}`; document.getElementById('display-latin').innerText=vPool[vIdx].l; input.value=""; input.disabled=false; input.style.borderColor="var(--border)"; input.focus(); document.getElementById('feedback').innerText=""; if(document.getElementById('timer-toggle').checked) startTimer(); }

document.getElementById('answer-input').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') {
        const input = e.target;
        if(input.disabled) return;
        
        const user = input.value.trim();
        
        // CHECK FOR EMPTY FIRST
        if (user === "") {
            input.style.borderColor = "var(--gold)";
            document.getElementById('feedback').innerHTML = `<span class="warning">Write something!</span>`;
            return; // Exit early so it doesn't count as a fail
        }

        const correctList = vPool[vIdx].e.split(',').map(s => s.trim());
        const isCorrect = correctList.some(ans => clean(user) === clean(ans));
        const isAlmost = !isCorrect && correctList.some(ans => isNear(user, ans));

        clearInterval(timerInterval);
        input.disabled = true;

        if(isCorrect) {
            input.style.borderColor = "var(--ok)";
            document.getElementById('feedback').innerHTML = `<span class="correct">Optime! (Correct)</span>`;
            vScore++; vIdx++;
            if(vScore > vBest) { vBest = vScore; localStorage.setItem('latin-best-streak', vBest); }
            setTimeout(showVWord, 800);
        } else if(isAlmost) {
            input.style.borderColor = "var(--gold)";
            document.getElementById('feedback').innerHTML = `<span class="warning">Close! Try again.</span>`;
            input.disabled = false; 
            input.focus();
        } else {
            input.style.borderColor = "var(--err)";
            document.getElementById('feedback').innerHTML = `<span class="incorrect">Incorrect. It means: ${vPool[vIdx].e}</span>`;
            wrongPile.push(vPool[vIdx]); 
            vScore = 0; 
            vIdx++;
            setTimeout(showVWord, 2500);
        }
        document.getElementById('score-display').innerText = `STREAK: ${vScore}`;
        document.getElementById('best-display').innerText = `BEST STREAK: ${vBest}`;
    }
});

function startTimer(){ const bar=document.getElementById('timer-bar'); document.getElementById('timer-container').style.display='block'; let w=100; clearInterval(timerInterval); timerInterval=setInterval(()=>{ w-=1.5; bar.style.width=w+"%"; if(w<=0){clearInterval(timerInterval); document.getElementById('answer-input').dispatchEvent(new KeyboardEvent('keydown',{'key':'Enter'}));} },100); }

function loadGrammar(id){ document.querySelectorAll('.container').forEach(c=>c.classList.remove('active')); document.getElementById('grammar-container').classList.add('active'); curG=id; const config=grammarLibrary[id]; document.getElementById('view-title').innerText=config.title; document.getElementById('table-head').innerHTML=`<tr><th>Case/Pers</th>${config.heads.slice(1).map(h => `<th>${h}</th>`).join('')}</tr>`; const body=document.getElementById('table-body'); body.innerHTML=''; config.keys.forEach((row,r)=>{ let html=`<tr><td><b>${config.labels[r]}</b></td>`; row.forEach((val,c)=>{html+=`<td><div id="gcell-${r}-${c}"><input type="text" class="grammar-input" id="gans-${r}-${c}" autocomplete="off"></div></td>`;}); body.innerHTML+=html+`</tr>`; }); }
function checkGrammar(){ const config=grammarLibrary[curG]; config.keys.forEach((row,r)=>{ row.forEach((val,c)=>{ const input=document.getElementById(`gans-${r}-${c}`); const cell=document.getElementById(`gcell-${r}-${c}`); const user=clean(input.value); const corr=clean(val); cell.querySelectorAll('.ans-hint').forEach(h=>h.remove()); if(user===corr){input.style.color="var(--ok)";} else{input.style.color="var(--err)"; const hint=document.createElement('span'); hint.className='ans-hint'; hint.innerText=val; cell.appendChild(hint);} }); }); }

function showFullTable(chs){ document.querySelectorAll('.container').forEach(c=>c.classList.remove('active')); document.getElementById('table-view-container').classList.add('active'); const body=document.getElementById('vocab-list-body'); body.innerHTML=''; chs.forEach(ch=>{ vocabLibrary[ch].forEach(w=>{ const r=document.createElement('tr'); r.innerHTML=`<td style="color:var(--accent); font-weight:bold; text-align:left;">${w.l}</td><td style="text-align:left;">${w.e}</td><td>${ch}</td>`; body.appendChild(r); }); }); }

function saveBg(slot) {
    const url = document.getElementById('bg-url-input').value;
    if(url) {
        localStorage.setItem('latin-bg-'+slot, url);
        localStorage.setItem('active-bg-slot', slot);
        applyBg(url);
    } else {
        const saved = localStorage.getItem('latin-bg-'+slot);
        if(saved) { localStorage.setItem('active-bg-slot', slot); applyBg(saved); }
    }
}
function applyBg(url) { document.body.classList.add('custom-bg'); document.body.style.setProperty('--bg-img', `url('${url}')`); }
function clearBg() { localStorage.removeItem('active-bg-slot'); document.body.classList.remove('custom-bg'); document.body.style.removeProperty('--bg-img'); }

window.onload = () => {
    const activeSlot = localStorage.getItem('active-bg-slot');
    if(activeSlot) {
        const url = localStorage.getItem('latin-bg-'+activeSlot);
        if(url) applyBg(url);
    }
    goHome();
};
</script>
