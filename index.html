<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Romanis Unofficial | Latin Mastery</title>
    <style>
        :root {
            --bg: #0d1117; --side: #161b22; --card: #1c1f26; --text: #c9d1d9;
            --accent: #58a6ff; --border: #30363d; --err: #f85149; --ok: #3fb950; --gold: #d29922;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.4s ease; }
        
        body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
        body.custom-bg::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: -1; }

        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; z-index: 10; }
        .sidebar h2 { font-size: 0.8rem; color: #8b949e; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .title-link { text-decoration: none; color: var(--accent); transition: 0.2s; }
        .nav-btn { background: transparent; border: none; color: var(--text); text-align: left; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .nav-btn:hover { background: #21262d; color: var(--accent); }
        .nav-btn.active { background: #1f6feb; color: white; font-weight: bold; }

        .main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 900px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; }
        .container.active { display: block; }

        h1 { margin-top: 0; color: white; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .instruction-box { background: rgba(210, 153, 34, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        th { background: #21262d; color: var(--accent); }
        .grammar-input { width: 90%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: white; text-align: center; font-size: 1.1rem; outline: none; }
        .grammar-input:focus { border-bottom: 2px solid var(--accent); }

        .vocab-ui { text-align: center; max-width: 500px; margin: 0 auto; }
        .latin-word { font-size: 2.5rem; font-weight: 700; color: #fff; margin: 20px 0; }
        .vocab-input { width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 2px solid var(--border); background: #0d1117; color: white; outline: none; text-align: center; }
        #timer-container { width: 100%; height: 8px; background: #111827; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        .feedback { font-weight: 600; margin: 10px 0; min-height: 1.5rem; }
        .correct { color: var(--ok); }
        .incorrect { color: var(--err); }
        .stats { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-top: 10px; }

        .btn-box { display: flex; gap: 15px; margin-top: 30px; justify-content: center; }
        button.action { background: #21262d; color: var(--accent); border: 1px solid var(--border); padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.check { background: var(--accent); color: white; border: none; }
        
        .theme-picker { display: flex; gap: 12px; justify-content: center; margin-top: 15px; }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .hidden { display: none; }
        .ans-hint { display: block; font-size: 0.75rem; color: var(--err); margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="https://garzryp.github.io/desromanisunofficial/" class="title-link">
        <h1 style="font-size: 1.1rem; margin-bottom: 20px;">🏛️ De Romanis Unofficial</h1>
    </a>
    
    <h2>Vocabulary</h2>
    <button class="nav-btn" onclick="openVocab([1,2,3,4,5,6,7,8])">All Chapters</button>
    <button class="nav-btn" onclick="openVocab([1,2,3,4])">CH 1-4</button>
    <button class="nav-btn" onclick="openVocab([5,6,7,8])">CH 5-8</button>

    <h2>Grammar: Perfect</h2>
    <button class="nav-btn active" onclick="loadGrammar('perf-sys')">Perfect & Pluperfect</button>
    
    <h2>Grammar: Present</h2>
    <button class="nav-btn" onclick="loadGrammar('verb-pres')">Present Indicative</button>
    <button class="nav-btn" onclick="loadGrammar('verb-impf')">Imperfect Indicative</button>
    <button class="nav-btn" onclick="loadGrammar('verb-subj')">Imperfect Subjunctive</button>
    
    <h2>Irregulars</h2>
    <button class="nav-btn" onclick="loadGrammar('irr-eo')">Eo, Ire</button>
    <button class="nav-btn" onclick="loadGrammar('irr-volo')">Volo & Nolo</button>
    
    <h2>Pronouns</h2>
    <button class="nav-btn" onclick="loadGrammar('pro-pers')">Personal (Ego/Tu)</button>
    <button class="nav-btn" onclick="loadGrammar('pro-demo')">Is, Ea, Id</button>
    <button class="nav-btn" onclick="loadGrammar('pro-hic')">Hic & Ille</button>
</div>

<div class="main">
    <div id="grammar-container" class="container active">
        <h1 id="view-title">Perfect & Pluperfect</h1>
        <div id="instruction-container"></div>
        <table id="master-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
        <div class="btn-box">
            <button class="action check" onclick="checkGrammar()">Check Answers</button>
            <button class="action" onclick="resetGrammar()">Reset</button>
        </div>
    </div>

    <div id="vocab-container" class="container">
        <div class="vocab-ui">
            <h1 id="vocab-title">Vocabulary Tester</h1>
            <div id="vocab-quiz-screen">
                <div id="timer-container"><div id="timer-bar"></div></div>
                <div class="stats" id="progress">WORD 1 OF X</div>
                <div class="latin-word" id="display-latin">---</div>
                <div class="feedback" id="feedback"></div>
                <input type="text" id="answer-input" class="vocab-input" placeholder="Type meaning..." autocomplete="off">
                <div class="stats" id="score-display">STREAK: 0</div>
                <div class="theme-picker" style="margin-top:20px;">
                    <div class="theme-dot" onclick="setTheme('default')" style="background: #0f111a;"></div>
                    <div class="theme-dot" onclick="setTheme('slot1')" style="background: #374151;"></div>
                    <div class="theme-dot" onclick="setTheme('slot2')" style="background: #374151;"></div>
                </div>
                <div style="margin-top:10px; font-size:0.8rem;">
                    <label><input type="checkbox" id="timer-toggle"> Sudden Death Timer</label>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const vocabLibrary = {
        1: [{l:"amō",e:"love, like"},{l:"dea",e:"goddess"},{l:"deus",e:"god"},{l:"et",e:"and, even"},{l:"etiam",e:"also, even"},{l:"fēmina",e:"woman"},{l:"fīlia",e:"daughter"},{l:"fīlius",e:"son"},{l:"homō",e:"man, human being, human"},{l:"īrātus",e:"angry"},{l:"lacrimō",e:"weep, cry"},{l:"laetus",e:"happy"},{l:"laudō",e:"praise"},{l:"līberī",e:"children"},{l:"māter",e:"mother"},{l:"multus",e:"much, many"},{l:"pater",e:"father"},{l:"pulcher",e:"beautiful, handsome"},{l:"pūniō",e:"punish"},{l:"rēgīna",e:"queen"},{l:"regō",e:"rule"},{l:"rēx",e:"king"},{l:"saepe",e:"often"},{l:"saevus",e:"savage, cruel"},{l:"sed",e:"but"},{l:"sum",e:"be, i am, am"},{l:"terreō",e:"frighten, terrify"},{l:"tum",e:"then"},{l:"uxor",e:"wife"}],
        2: [{l:"ad",e:"to, towards, at"},{l:"arma",e:"arms, weapons"},{l:"audāx",e:"bold, daring"},{l:"bellum",e:"war"},{l:"capiō",e:"take, catch, capture, make (a plan)"},{l:"contrā",e:"against"},{l:"corpus",e:"body"},{l:"currō",e:"run"},{l:"eō",e:"go"},{l:"flūmen",e:"river"},{l:"fortis",e:"brave, strong"},{l:"fortiter",e:"bravely, strongly"},{l:"gladius",e:"sword"},{l:"Graecus",e:"Greek"},{l:"hasta",e:"spear"},{l:"iaciō",e:"throw"},{l:"in",e:"into, onto, in, on"},{l:"ingēns",e:"huge"},{l:"inquit",e:"say, says"},{l:"interficiō",e:"kill"},{l:"maneō",e:"remain, stay"},{l:"nōn",e:"not"},{l:"per",e:"through, along"},{l:"perīculum",e:"danger"},{l:"prope",e:"near"},{l:"sagitta",e:"arrow"},{l:"silva",e:"wood"},{l:"timeō",e:"fear, be afraid"},{l:"trāns",e:"across"}],
        3: [{l:"ā, ab",e:"from, away from, by"},{l:"ascendō",e:"climb"},{l:"audiō",e:"hear, listen to"},{l:"auxilium",e:"help"},{l:"bonus",e:"good"},{l:"caelum",e:"sky, heaven"},{l:"celeriter",e:"quickly"},{l:"cōnspiciō",e:"catch sight of, notice"},{l:"cum",e:"with, when"},{l:"dē",e:"from, down from, about"},{l:"dēscendō",e:"go down, come down, descend"},{l:"difficilis",e:"difficult"},{l:"diū",e:"for a long time"},{l:"ē, ex",e:"from, out of, out from"},{l:"equus",e:"horse"},{l:"facilis",e:"easy"},{l:"fēlīx",e:"fortunate, happy, lucky"},{l:"in",e:"in, on, onto, into"},{l:"iubeō",e:"order"},{l:"magnus",e:"big, large, great"},{l:"malus",e:"evil, bad"},{l:"mare",e:"sea"},{l:"mōns",e:"mountain"},{l:"ōlim",e:"once, some time ago"},{l:"petō",e:"make for, seek, beg, ask for"},{l:"possum",e:"can, be able"},{l:"pugnō",e:"fight"},{l:"subitō",e:"suddenly"},{l:"tandem",e:"at last, finally"},{l:"terra",e:"ground, land, country, earth"}],
        4: [{l:"aedificō",e:"build"},{l:"ager",e:"field"},{l:"aurum",e:"gold"},{l:"crēdō",e:"believe, trust"},{l:"crūdēlis",e:"cruel"},{l:"cūr?",e:"why?"},{l:"dō",e:"give"},{l:"dōnum",e:"gift, present"},{l:"faciō",e:"make, do"},{l:"ferō",e:"bring, carry, bear"},{l:"habeō",e:"have, hold"},{l:"īra",e:"anger"},{l:"miser",e:"miserable, wretched, sad"},{l:"nōlō",e:"not want, refuse"},{l:"nōmen",e:"name"},{l:"nōnne?",e:"surely?, surely, surely..., surely...?"},{l:"num?",e:"surely not?, surely not, surely...not?, surely...not"},{l:"pecūnia",e:"money"},{l:"persuādeō",e:"persuade"},{l:"perterritus",e:"terrified"},{l:"pōnō",e:"put, place, set up"},{l:"quandō?",e:"when?, when"},{l:"quod",e:"because"},{l:"semper",e:"always"},{l:"tamen",e:"however"},{l:"templum",e:"temple"},{l:"trīstis",e:"sad"},{l:"ubi?",e:"where?, where, when?, when"},{l:"volō",e:"want, wish, be willing"}],
        5: [{l:"absum",e:"be absent, be away, be distant from"},{l:"adsum",e:"be here, be present"},{l:"agricola",e:"farmer"},{l:"ancilla",e:"female slave, slave girl, slave, slave woman"},{l:"aqua",e:"water"},{l:"bibō",e:"drink"},{l:"cēna",e:"dinner, meal"},{l:"cēterī",e:"the rest, the others, rest, others"},{l:"cibus",e:"food"},{l:"clāmō",e:"shout"},{l:"cōnsūmō",e:"eat, consume"},{l:"fessus",e:"tired"},{l:"festīnō",e:"hurry"},{l:"iterum",e:"again"},{l:"lūdus",e:"school, game, public games, festival"},{l:"magnopere",e:"greatly, very much"},{l:"mortuus",e:"dead"},{l:"mox",e:"soon"},{l:"nunc",e:"now"},{l:"parō",e:"prepare, provide"},{l:"rīdeō",e:"laugh, smile, laugh at"},{l:"sacer",e:"sacred"},{l:"servus",e:"slave, male slave, slave boy"},{l:"spectō",e:"look at, watch"},{l:"taberna",e:"shop, inn"},{l:"urbs",e:"city"},{l:"veniō",e:"come"},{l:"vīlla",e:"house, country villa, villa"},{l:"vīnum",e:"wine"}],
        6: [{l:"altus",e:"high, deep"},{l:"amīcus",e:"friend, male friend"},{l:"annus",e:"year"},{l:"dormiō",e:"sleep"},{l:"emō",e:"buy"},{l:"hīc",e:"here"},{l:"hōra",e:"hour"},{l:"iam",e:"now, already"},{l:"ibi",e:"there"},{l:"itaque",e:"and so, therefore"},{l:"iuvenis",e:"young man"},{l:"locus",e:"place"},{l:"meus",e:"my"},{l:"moneō",e:"warn, advise"},{l:"nōlī / nōlīte",e:"don't, do not"},{l:"noster",e:"our"},{l:"novus",e:"new"},{l:"numquam",e:"never"},{l:"ostendō",e:"show"},{l:"parvus",e:"small"},{l:"puella",e:"girl"},{l:"puer",e:"boy"},{l:"respondeō",e:"reply"},{l:"rogō",e:"ask, ask for"},{l:"sīc",e:"thus, in this way"},{l:"suus",e:"his, her, its, their"},{l:"tuus",e:"your, yours"},{l:"verbum",e:"word"},{l:"vester",e:"your, yours"},{l:"videō",e:"see"}],
        7: [{l:"ambulō",e:"walk"},{l:"antequam",e:"before"},{l:"cīvis",e:"citizen"},{l:"clārus",e:"famous, clear"},{l:"dīcō",e:"say, speak, tell"},{l:"domina",e:"mistress"},{l:"dominus",e:"master"},{l:"et ... et",e:"both ... and, both and, both...and"},{l:"forum",e:"forum, market place"},{l:"habitō",e:"live"},{l:"hic",e:"this, these"},{l:"hortus",e:"garden"},{l:"ille",e:"that, those, he, she, it"},{l:"is",e:"he, she, it, that, those"},{l:"līberō",e:"set free"},{l:"lībertus",e:"freedman, ex-slave"},{l:"mūrus",e:"wall"},{l:"nūntius",e:"messenger"},{l:"omnis",e:"all, every"},{l:"paucī",e:"few, a few"},{l:"postquam",e:"after, when"},{l:"quamquam",e:"although"},{l:"quī",e:"who, which"},{l:"quis?",e:"who? what? which?"},{l:"quoque",e:"also, too"},{l:"salūtō",e:"greet"},{l:"senātor",e:"senator"},{l:"ubi",e:"when, where"},{l:"via",e:"street, road, way"}],
        8: [{l:"abeō",e:"go away"},{l:"adeō",e:"go to, approach"},{l:"appropinquō",e:"approach, come near to"},{l:"clāmor",e:"shout, shouting, noise"},{l:"conveniō",e:"come together, gather, meet"},{l:"cupiō",e:"want, desire"},{l:"ego",e:"I, me"},{l:"enim",e:"for"},{l:"epistula",e:"letter"},{l:"exeō",e:"go out from, go away, go out, exit, leave"},{l:"ferox",e:"fierce, ferocious"},{l:"frūstrā",e:"in vain"},{l:"ineō",e:"go into, enter"},{l:"labōrō",e:"work, toil, labor, labour"},{l:"legō",e:"read, choose"},{l:"liber",e:"book"},{l:"longus",e:"long"},{l:"magis",e:"more"},{l:"magister",e:"teacher"},{l:"maior",e:"bigger, larger, greater"},{l:"maximē",e:"very greatly"},{l:"maximus",e:"greatest, largest, biggest"},{l:"medius",e:"middle"},{l:"melior",e:"better"},{l:"minimus",e:"smallest, least"},{l:"minor",e:"smaller, less"},{l:"nōbilis",e:"of noble birth, renowned"},{l:"nōs",e:"we, us"},{l:"nōtus",e:"famous, well-known"},{l:"optimus",e:"best"},{l:"peior",e:"worse"},{l:"pereō",e:"die, perish"},{l:"pessimus",e:"worst"},{l:"plūrēs",e:"more"},{l:"plūrimus",e:"most, very many"},{l:"plūs",e:"more"},{l:"quam",e:"than, how, as possible"},{l:"redeō",e:"go back, come back, return"},{l:"scrībō",e:"write"},{l:"sē",e:"himself, herself, itself, themselves"},{l:"senex",e:"old man"},{l:"stultus",e:"stupid, foolish"},{l:"trānseō",e:"go over, cross"},{l:"tū",e:"you"},{l:"vir",e:"man, husband"},{l:"vōs",e:"you, you (plural)"}]
    };

    const grammarLibrary = {
        'perf-sys': { title: "Perfect & Pluperfect", info: "Use 3rd principal part - 'i' + endings.", heads: ["Person", "Perfect", "Pluperfect"], keys: [["i", "eram"], ["isti", "eras"], ["it", "erat"], ["imus", "eramus"], ["istis", "eratis"], ["erunt", "erant"]] },
        'verb-pres': { title: "Present Indicative", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["o","eo","o","io"], ["as","es","is","is"], ["at","et","it","it"], ["amus","emus","imus","imus"], ["atis","etis","itis","itis"], ["ant","ent","unt","iunt"]] },
        'verb-impf': { title: "Imperfect Indicative", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["abam","ebam","ebam","iebam"], ["abas","ebas","ebas","iebas"], ["abat","ebat","ebat","iebat"], ["abamus","ebamus","ebamus","iebamus"], ["abatis","ebatis","ebatis","iebatis"], ["abant","ebant","ebant","iebant"]] },
        'verb-subj': { title: "Imperfect Subjunctive", heads: ["Person", "1st", "2nd", "3rd", "4th"], keys: [["arem","erem","erem","irem"], ["ares","eres","eres","ires"], ["aret","eret","eret","iret"], ["aremus","eremus","eremus","iremus"], ["aretis","eretis","eretis","iretis"], ["arent","erent","erent","irent"]] },
        'irr-eo': { title: "Eo, Ire (To Go)", heads: ["Person", "Pres", "Impf", "Perf", "Plup"], keys: [["eo","ibam","ii","ieram"], ["is","ibas","isti","ieras"], ["it","ibat","iit","ierat"], ["imus","ibamus","iimus","ieramus"], ["itis","ibatis","istis","ieratis"], ["eunt","ibant","ierunt","ierant"]] },
        'irr-volo': { title: "Volo & Nolo", heads: ["Person", "Volo", "Nolo"], keys: [["volo","nolo"], ["vis","non vis"], ["vult","non vult"], ["volumus","nolumus"], ["vultis","non vultis"], ["volunt","nolunt"]] },
        'pro-pers': { title: "Personal Pronouns", heads: ["Case", "1s", "2s", "1p", "2p"], labels: ["Nom","Acc","Dat","Gen"], keys: [["ego","tu","nos","vos"], ["me","te","nos","vos"], ["mihi","tibi","nobis","vobis"], ["mei","tui","nostrum","vostrum"]] },
        'pro-demo': { title: "Is, Ea, Id", heads: ["Case", "Masc", "Fem", "Neut"], labels: ["Acc S","Gen S","Dat S","Acc P","Gen P","Dat P"], keys: [["eum","eam","id"], ["eius","eius","eius"], ["ei","ei","ei"], ["eos","eas","ea"], ["eorum","earum","eorum"], ["eis","eis","eis"]] },
        'pro-hic': { title: "Hic & Ille (Nom/Acc)", heads: ["Case", "Hic (M)", "Hic (F)", "Ille (M)", "Ille (F)"], labels: ["Nom S","Acc S","Nom P","Acc P"], keys: [["hic","haec","ille","illa"], ["hunc","hanc","illum","illam"], ["hi","hae","illi","illae"], ["hos","has","illos","illas"]] }
    };

    let curG = 'perf-sys', vPool = [], vIdx = 0, vScore = 0, isVProc = false, timer;

    function loadGrammar(id) {
        document.getElementById('vocab-container').classList.remove('active');
        document.getElementById('grammar-container').classList.add('active');
        curG = id; const config = grammarLibrary[id];
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(id.split('-')[0])));
        document.getElementById('view-title').innerText = config.title;
        document.getElementById('instruction-container').innerHTML = config.info ? `<div class="instruction-box">💡 <b>Rule:</b> ${config.info}</div>` : '';
        document.getElementById('table-head').innerHTML = `<tr>${config.heads.map(h => `<th>${h}</th>`).join('')}</tr>`;
        const body = document.getElementById('table-body'); body.innerHTML = '';
        const rows = config.labels || ["1s", "2s", "3s", "1p", "2p", "3p"];
        config.keys.forEach((row, r) => {
            let html = `<tr><td><b>${rows[r]}</b></td>`;
            row.forEach((val, c) => html += `<td><div id="cell-${r}-${c}"><input type="text" class="grammar-input" id="ans-${r}-${c}" data-row="${r}" data-col="${c}" autocomplete="off"></div></td>`);
            body.innerHTML += html + `</tr>`;
        });
        setupGNav();
    }

    function setupGNav() {
        document.querySelectorAll('.grammar-input').forEach(i => i.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === 'ArrowDown') {
                e.preventDefault();
                const r = parseInt(i.dataset.row), c = parseInt(i.dataset.col);
                const n = document.querySelector(`.grammar-input[data-row="${r+1}"][data-col="${c}"]`) || document.querySelector(`.grammar-input[data-row="0"][data-col="${c+1}"]`);
                if (n) n.focus();
            }
        }));
    }

    function checkGrammar() {
        grammarLibrary[curG].keys.forEach((row, r) => {
            row.forEach((correct, c) => {
                const input = document.getElementById(`ans-${r}-${c}`), container = document.getElementById(`cell-${r}-${c}`);
                const val = input.value.trim().toLowerCase();
                input.classList.remove('correct', 'wrong');
                container.querySelectorAll('.ans-hint').forEach(h => h.remove());
                if(val === correct) input.classList.add('correct');
                else { input.classList.add('wrong'); const s = document.createElement('span'); s.className = 'ans-hint'; s.innerText = correct; container.appendChild(s); }
            });
        });
    }

    function resetGrammar() { loadGrammar(curG); }

    function openVocab(chs) {
        document.getElementById('grammar-container').classList.remove('active');
        document.getElementById('vocab-container').classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        vPool = chs.flatMap(c => vocabLibrary[c]).sort(() => Math.random() - 0.5);
        vIdx = 0; vScore = 0; showVWord();
    }

    function showVWord() {
        if (vIdx >= vPool.length) { document.getElementById('vocab-quiz-screen').innerHTML = `<h1>Complete!</h1><p>Streak: ${vScore}</p><button class="action" onclick="location.reload()">Reset</button>`; return; }
        document.getElementById('progress').innerText = `WORD ${vIdx + 1} OF ${vPool.length}`;
        document.getElementById('display-latin').innerText = vPool[vIdx].l;
        const i = document.getElementById('answer-input'); i.value = ""; i.focus();
        if(document.getElementById('timer-toggle').checked) startVTimer();
    }

    function startVTimer() {
        clearInterval(timer); document.getElementById('timer-container').style.display = 'block';
        let rem = 100; timer = setInterval(() => { rem -= 2; document.getElementById('timer-bar').style.width = rem + '%'; if(rem <= 0) { clearInterval(timer); vIdx++; showVWord(); } }, 100);
    }

    document.getElementById('answer-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            const val = e.target.value.toLowerCase().trim();
            const correct = vPool[vIdx].e.toLowerCase().split(',').map(s => s.trim());
            const f = document.getElementById('feedback');
            if (correct.includes(val)) { f.innerText = "CORRECT!"; f.className = "feedback correct"; vScore++; vIdx++; setTimeout(() => { f.innerText = ""; showVWord(); }, 600); }
            else { f.innerText = `WRONG: ${vPool[vIdx].e}`; f.className = "feedback incorrect"; vScore = 0; vIdx++; setTimeout(() => { f.innerText = ""; showVWord(); }, 2000); }
            document.getElementById('score-display').innerText = `STREAK: ${vScore}`;
        }
    });

    function setTheme(slot) {
        const url = localStorage.getItem(`latin-url-${slot}`);
        if(url) { document.body.classList.add('custom-bg'); document.body.style.backgroundImage = `url('${url}')`; }
        else { document.body.classList.remove('custom-bg'); document.body.style.backgroundImage = 'none'; }
    }

    window.onload = () => loadGrammar('perf-sys');
</script>
</body>
</html>
